<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Missed Contributions – Stokvel App</title>
  <link rel="stylesheet" href="group-overview.css" />
  <style>
    .filter-bar {
      display: flex;
      gap: 8px;
      margin-bottom: 1.25rem;
      flex-wrap: wrap;
    }

    .filter-pill {
      padding: 6px 16px;
      border-radius: 20px;
      font-size: 12px;
      font-weight: 700;
      border: 1.5px solid rgba(14, 148, 144, 0.25);
      background: white;
      color: #64748b;
      cursor: pointer;
      font-family: inherit;
      transition: all 0.15s ease;
    }

    .filter-pill.active {
      background: #034e52;
      color: #2dd4bf;
      border-color: #034e52;
    }

    .contributions-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 13px;
    }

    .contributions-table th {
      text-align: left;
      padding: 8px 12px;
      font-size: 11px;
      font-weight: 700;
      color: #64748b;
      text-transform: uppercase;
      border-bottom: 1.5px solid #e0f7f6;
    }

    .contributions-table td {
      padding: 11px 12px;
      border-bottom: 1px solid #f0fafa;
      color: #0f172a;
      vertical-align: middle;
    }

    .contributions-table tr:last-child td {
      border-bottom: none;
    }

    .status-pill {
      display: inline-block;
      padding: 2px 8px;
      border-radius: 12px;
      font-size: 10px;
      font-weight: 700;
      text-transform: uppercase;
    }

    .status-pill.paid    { background: #dcfce7; color: #166534; }
    .status-pill.pending { background: #fef9c3; color: #854d0e; }
    .status-pill.missed  { background: #fee2e2; color: #991b1b; }

    .btn-flag {
      padding: 6px 14px;
      background: #fee2e2;
      color: #991b1b;
      border: 1.5px solid #fecaca;
      border-radius: 8px;
      font-size: 12px;
      font-weight: 700;
      cursor: pointer;
      font-family: inherit;
      transition: background 0.15s ease;
    }

    .btn-flag:hover { background: #fecaca; }

    .no-action {
      font-size: 12px;
      color: #94a3b8;
    }

    .member-cell {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .member-avatar {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      background: #e0f7f6;
      color: #034e52;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 700;
      font-size: 12px;
      flex-shrink: 0;
    }

    .error-banner {
      background: #fef2f2;
      border: 1px solid #fecaca;
      border-radius: 8px;
      padding: 12px 16px;
      font-size: 14px;
      color: #991b1b;
      margin-bottom: 16px;
    }

    dialog {
      border: 1px solid rgba(14, 148, 144, 0.2);
      border-radius: 16px;
      padding: 28px;
      max-width: 400px;
      width: 90%;
      box-shadow: 0 8px 32px rgba(14, 148, 144, 0.15);
    }

    dialog h2 {
      font-size: 16px;
      font-weight: 700;
      color: #034e52;
      margin-bottom: 8px;
    }

    dialog p {
      font-size: 13px;
      color: #64748b;
      margin-bottom: 18px;
    }

    dialog::backdrop {
      background: rgba(0, 0, 0, 0.45);
    }

    .dialog-label {
      font-size: 11px;
      font-weight: 700;
      color: #64748b;
      text-transform: uppercase;
      display: block;
      margin-bottom: 6px;
    }

    .dialog-input {
      width: 100%;
      padding: 10px 12px;
      border: 1.5px solid rgba(14, 148, 144, 0.25);
      border-radius: 8px;
      font-size: 14px;
      font-family: inherit;
      outline: none;
      box-sizing: border-box;
    }

    .dialog-input:focus {
      border-color: #0e9490;
      box-shadow: 0 0 0 3px rgba(14, 148, 144, 0.1);
    }

    .dialog-actions {
      display: flex;
      gap: 10px;
      margin-top: 20px;
      justify-content: flex-end;
    }

    .btn-cancel {
      padding: 9px 20px;
      background: white;
      color: #64748b;
      border: 1.5px solid rgba(14, 148, 144, 0.25);
      border-radius: 8px;
      font-size: 13px;
      font-weight: 700;
      cursor: pointer;
      font-family: inherit;
    }

    .btn-confirm-flag {
      padding: 9px 20px;
      background: linear-gradient(135deg, #ef4444 0%, #b91c1c 100%);
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 13px;
      font-weight: 700;
      cursor: pointer;
      font-family: inherit;
      box-shadow: 0 2px 8px rgba(239, 68, 68, 0.3);
    }

    .section-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 1rem;
    }

    .back-link {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-size: 13px;
      color: #0e9490;
      font-weight: 600;
      background: none;
      border: none;
      cursor: pointer;
      margin-bottom: 1.25rem;
      font-family: inherit;
    }
  </style>
</head>
<body>

  <header class="site-header">
    <figure class="header-logo">
      <i class="logo-mark"></i>
      <h1>STOKVEL</h1>
    </figure>
    <p class="header-title">Treasurer Portal</p>
    <nav class="header-right">
      <address class="header-avatar" id="avatar"></address>
      <button class="logout-btn" id="logoutBtn">Log out</button>
    </nav>
  </header>

  <main class="page">

    <button class="back-link" id="backBtn">← Back to group</button>

    <div id="errorBanner" class="error-banner" hidden></div>

    <article class="card">
      <header class="section-header">
        <h2 class="card-title">Missed Contributions</h2>
        <output id="memberCount"></output>
      </header>

      <!-- Filter pills -->
      <div class="filter-bar">
        <button class="filter-pill active" id="filter-all"     onclick="filterTable('all')">All</button>
        <button class="filter-pill"        id="filter-pending" onclick="filterTable('pending')">Pending</button>
        <button class="filter-pill"        id="filter-missed"  onclick="filterTable('missed')">Missed</button>
        <button class="filter-pill"        id="filter-paid"    onclick="filterTable('paid')">Paid</button>
      </div>

      <p class="loading-msg" id="loadingMsg">Loading contributions...</p>

      <div id="emptyState" class="empty-tab-msg" hidden>
        No contributions found for this group.
      </div>

      <div id="tableContainer" hidden>
        <table class="contributions-table">
          <caption class="sr-only">Member contributions and payment status</caption>
          <thead>
            <tr>
              <th>Member</th>
              <th>Due date</th>
              <th>Amount</th>
              <th>Status</th>
              <th>Note</th>
              <th>Action</th>
            </tr>
          </thead>
          <tbody id="contributionsBody"></tbody>
        </table>
      </div>

    </article>
  </main>

  <!-- Flag as missed modal -->
  <dialog id="flagModal">
    <h2>Flag as missed?</h2>
    <p>
      This will mark <strong id="modalMemberName"></strong>'s contribution
      as missed and record a note.
    </p>
    <label class="dialog-label" for="flagNote">Reason <span style="font-weight:400;text-transform:none;">(optional)</span></label>
    <input
      type="text"
      id="flagNote"
      class="dialog-input"
      placeholder="e.g. No payment received by due date"
      autocomplete="off"
    />
    <div class="dialog-actions">
      <button class="btn-cancel" onclick="closeFlagModal()">Cancel</button>
      <button class="btn-confirm-flag" onclick="confirmFlag()">Flag as missed</button>
    </div>
  </dialog>

  <script src="../config.js"></script>
  <script src="https://cdn.auth0.com/js/auth0-spa-js/2.1/auth0-spa-js.production.js"></script>
  <script src="../auth_service.js"></script>
  <script src="../js/missed-contributions.js"></script>
</body>
</html>
