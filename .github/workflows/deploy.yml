name: Deploy Stokvel App

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  NODE_VERSION: "18.x"

jobs:
  test-backend:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"

      - name: Debug - Check DATABASE_URL secret
        run: |
          if [ "${{ secrets.DATABASE_URL }}" != "" ]; then
            echo "✅ DATABASE_URL secret is set"
          else
            echo "❌ DATABASE_URL secret is EMPTY"
          fi

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: |
          export DATABASE_URL="${{ secrets.DATABASE_URL }}"
          npx prisma generate --schema=prisma/schema.prisma

      - name: Security audit
        run: npm audit --production --audit-level=moderate || echo "Security issues found but continuing"

      - name: Run tests
        id: test_results
        run: |
          npm test || true

          TOTAL=$(cat results.json | jq '.numTotalTests')
          PASSED=$(cat results.json | jq '.numPassedTests')
          FAILED=$(cat results.json | jq '.numFailedTests')

          if [ "$TOTAL" -eq 0 ]; then
            PERCENT=0
          else
            PERCENT=$(echo "scale=0; $PASSED * 100 / $TOTAL" | bc)
          fi

          echo "total=$TOTAL"   >> $GITHUB_OUTPUT
          echo "passed=$PASSED" >> $GITHUB_OUTPUT
          echo "failed=$FAILED" >> $GITHUB_OUTPUT
          echo "percent=$PERCENT" >> $GITHUB_OUTPUT
          echo "✅ Passed: $PASSED / $TOTAL ($PERCENT%)"

      - name: Set badge color
        id: badge_color
        run: |
          PERCENT=${{ steps.test_results.outputs.percent }}
          if [ "$PERCENT" -ge 90 ]; then
            echo "color=brightgreen" >> $GITHUB_OUTPUT
          elif [ "$PERCENT" -ge 70 ]; then
            echo "color=yellow" >> $GITHUB_OUTPUT
          else
            echo "color=red" >> $GITHUB_OUTPUT
          fi

      - name: Update test badge
        uses: schneegans/dynamic-badges-action@v1.7.0
        with:
          auth: ${{ secrets.GIST_SECRET }}
          gistID: ${{ secrets.GIST_ID }}
          filename: stokvel-test-badge.json
          label: "Tests"
          message: "${{ steps.test_results.outputs.percent }}% (${{ steps.test_results.outputs.passed }}/${{ steps.test_results.outputs.total }})"
          color: ${{ steps.badge_color.outputs.color }}

  build-frontend:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Check static files
        run: |
          echo "Checking critical files..."
          test -f frontend/pages/index.html && echo "✅ index.html exists"
          test -f frontend/pages/dashboard.html && echo "✅ dashboard.html exists"
          test -f frontend/scripts/config.js && echo "✅ config.js exists"
          test -f prisma/schema.prisma && echo "✅ Prisma schema exists"
          echo "All critical files present"

  deploy-production:
    needs: [test-backend, build-frontend]
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Deploy to Vercel
        uses: amondnet/vercel-action@v20
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID }}
          vercel-args: "--prod"
          working-directory: ./
