name: Deploy Stokvel App

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  NODE_VERSION: "18.x"

jobs:
  # Job 1: Test the backend
  test-backend:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"

      - name: Create .env file from secrets
        run: |
          echo "DATABASE_URL=${{ secrets.DATABASE_URL }}" >> .env
          echo "AUTH0_DOMAIN=${{ secrets.AUTH0_DOMAIN }}" >> .env
          echo "AUTH0_AUDIENCE=${{ secrets.AUTH0_AUDIENCE }}" >> .env
          echo "PORT=3000" >> .env

      - name: Verify .env was created
        run: |
          if [ -f .env ]; then
            echo "✅ .env file created"
          else
            echo "❌ .env file missing"
          fi

      - name: Install dependencies
        run: npm ci

      - name: Run Prisma validation
        run: npx prisma validate --schema=prisma/schema.prisma

      - name: Generate Prisma client
        run: npx prisma generate --schema=prisma/schema.prisma

      - name: Security audit
        run: npm audit --production --audit-level=moderate || echo "Security issues found but continuing"

  # Job 2: Build check for frontend
  build-frontend:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Check static files
        run: |
          echo "Checking critical files..."
          test -f frontend/pages/index.html && echo "✅ index.html exists"
          test -f frontend/pages/dashboard.html && echo "✅ dashboard.html exists"
          test -f frontend/scripts/config.js && echo "✅ config.js exists"
          test -f prisma/schema.prisma && echo "✅ Prisma schema exists"
          echo "All critical files present"

  # Job 3: Deploy to Vercel
  deploy-production:
    needs: [test-backend, build-frontend]
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Create .env for Vercel
        run: |
          echo "DATABASE_URL=${{ secrets.DATABASE_URL }}" >> .env
          echo "AUTH0_DOMAIN=${{ secrets.AUTH0_DOMAIN }}" >> .env
          echo "AUTH0_AUDIENCE=${{ secrets.AUTH0_AUDIENCE }}" >> .env

      - name: Deploy to Vercel
        uses: amondnet/vercel-action@v20
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID }}
          vercel-args: "--prod"
          working-directory: ./
